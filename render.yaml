services:
  - type: web
    name: ai-meeting-task-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_DEBUG
        value: "false"
      - key: DRIVE_WATCHER_ENABLED
        value: "false"
      - key: DRIVE_WATCH_INTERVAL_SECONDS
        value: "120"
      - key: DATA_DIR
        value: .
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
    
